<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF Crime on the Map</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=IBM+Plex+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: #f9f9f9;
        }

        svg {
            width: 100%;
            max-height: 75vh;
            display: block;
        }

        #tooltip {
            position: fixed;
            z-index: 100;
            background: rgba(0,0,0,0.72);
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            pointer-events: none;
            display: none;
        }

        .neighborhood-bg {
            fill: #c8d0d9;
            stroke: #fff;
            stroke-width: 0.8px;
        }

        body.stage-bubble .neighborhood-bg {
            fill: #d9c8c8;
        }

        .legendTitle {
            font-size: 13px;
            font-weight: bold;
            fill: #333;
        }

        .label {
            font-size: 11px;
            fill: #444;
        }

        .map-title {
            font-size: 24px;
            font-weight: bold;
            fill: #222;
        }

        #stage {
            position: relative;
            width: 100%;
            margin: 0 auto;
        }

        #narration {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        #narration h1 {
            font-family: 'Climate Crisis', sans-serif;
            font-size: 56px;
            margin: 0;
        }

        #controls {
            text-align: center;
            margin-top: 20px;
        }

        #controls button {
            font-size: 22px;
            padding: 14px 36px;
            border-radius: 6px;
        }

        #controls .label {
            font-size: 14px;
        }

        #caption {
            text-align: center;
            width: 75%;
            margin: 8px auto 0;
            font-size: 16px;
        }

        #subgraph {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 1px solid #888;
            padding: 0;
            z-index: 10;
            width: 700px;
            min-width: 250px;
            resize: horizontal;
            overflow: hidden;
        }

        #subgraph-handle {
            cursor: move;
            padding: 8px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }

        #subgraph img {
            display: block;
            width: 100%;
        }

        /* custom styling for year scroller. Medium article on js styling used as reference: https://javascript.plainenglish.io/css-range-sliders-transform-the-default-into-beautiful-ui-541f0f78e0bc */
        #year-scrubber {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        #year-scrubber::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
        }
        #year-scrubber::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        /* end citation */

        /* a lot of specific color palette setting for elements within the charts */
        body.stage-bubble {
            background-color: #ffeded;
        }
        body.stage-bubble #stage > svg .map-title,
        body.stage-bubble #stage > svg .label,
        body.stage-bubble #stage > svg .legendTitle {
            fill: #1f0202;
        }
        body.stage-bubble #caption {
            color: #1f0202;
        }
        body.stage-bubble #controls .label {
            color: #1f0202;
        }
        body.stage-bubble #controls button {
            color: #1f0202;
            border: 1px solid #1f0202;
            background: transparent;
        }
        body.stage-bubble #year-scrubber {
            background: white;
            border: 1px solid #1f0202;
        }
        body.stage-bubble #year-scrubber::-webkit-slider-thumb {
            background: #1f0202;
        }
        body.stage-bubble #year-scrubber::-moz-range-thumb {
            background: #1f0202;
        }

        body.stage-choropleth {
            background-color: #edf4ff;
        }
        body.stage-choropleth #stage > svg .map-title,
        body.stage-choropleth #stage > svg .label,
        body.stage-choropleth #stage > svg .legendTitle {
            fill: #051630;
        }
        body.stage-choropleth #caption {
            color: #051630;
        }
        body.stage-choropleth #controls button {
            color: #051630;
            border: 1px solid #051630;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="tooltip"></div>
    <div id="stage">
        <div id="narration"></div>
        <div id="subgraph" hidden>
            <div id="subgraph-handle">
                <button id="subgraph-close">Close</button>
            </div>
            <div id="subgraph-chart"></div>
        </div>
    </div>
    <div id="caption"></div>
    <div id="controls"></div>

    <script>
        /**
         * D3 code written originally using D3 observable example library,
         * assignment A9,
         * D3 documentation on new concepts,
         * and a few other references that are cited as they appear.
        */

        // one csv per year so no single file exceeds github's 100mb limit
        const CSV_YEARS = ["2018","2019","2020","2021","2022","2023","2024","2025","2026"];
        const GEOJSON = "sf_neighborhoods.geojson";

        // establish captions as const so i don't need to search for them to change them
        const captions = {
            bubblePrompt: "Scroll around to see the changes in crime levels, or click on the highlighted Tenderloin to learn a more detailed breakdown of its crime levels over time.",
            choroPrompt: "Click on the highlighted Tenderloin to see a full breakdown of the most common crime types.",
            bubbleByYear: {
                all:    "When people talk about crime in San Francisco, they usually jump right to the Tenderloin (highlighted in this chart), but it's actually number <b>two</b> overall. There have been more police incidents in <i>The Mission</i> since 2018. This graph shows the amount of incidents in a specific neighborhood. (Color and size are scaled on the same variable to emphasize.)",
                "2020": "The spread of COVID-19 causes a sudden drop in the amount of incidents as people are forced to stay inside.",
                "2026": "At the time of writing this, this dataset only reaches until March 2026, so this year is mostly incomplete."
            },
            bubbleDefault:   "Generally, the notion holds true that downtown areas have more crime, as a result of many factors.",
            bubbleSubgraph:     "Interesting... this graph makes the dropoff in crime levels from COVID even more apparent, and also lets us see exactly what incidents tend to happen. Curious about other neighborhoods? Click on another to pull up a similar chart for a different neighborhood, or click <i>Continue</i> to see the most common crime type in SF by neighborhood.",
            choropleth:      "Actually, <i>every neighborhood</i> in SF has the same #1 crime by frequency! Everywhere from the heart of downtown to the outer edges all share the same most frequent incident type.",
            choroplethSubgraph: "Looking at the treemap shows a more detailed breakdown-- including, as most would expect, that reports of drug use are quite high in the Tenderloin. Curious about another neighborhood? Click on another to see the breakdown of crime in a different area, and see what differences you can find."
        };

        // set up shared svg
        const svg_width = 980;
        const svg_height = 560;
        const legend_width = 230;
        const map_width = svg_width;  // map fills full width; legend overlays right edge

        const svg = d3.select("#stage").append("svg")
            .attr("viewBox", [0, 0, svg_width, svg_height]);

        // zoomable container holds map content; uiLayer stays fixed for title and legend
        // d3 examples used as reference
        const zoomLayer = svg.append("g").attr("class", "zoom-layer");
        const baseLayer = zoomLayer.append("g").attr("class", "base-layer");
        const dataLayer = zoomLayer.append("g").attr("class", "data-layer");
        const overlayLayer = zoomLayer.append("g").attr("class", "overlay-layer");
        const uiLayer = svg.append("g").attr("class", "ui-layer");

        // pan and zoom behavior, applied to the zoom layer so ui stays put
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .translateExtent([[0, 0], [svg_width, svg_height]])
            .on("zoom", (event) => zoomLayer.attr("transform", event.transform));
        svg.call(zoom);

        // grab containers for stage-specific text and buttons
        const narration = d3.select("#narration");
        const caption = d3.select("#caption");
        const controls = d3.select("#controls");
        const tooltip  = d3.select("#tooltip");

        // subgraph helpers for the click-through visualizations
        const subgraph = d3.select("#subgraph");
        const subgraphEl = subgraph.node();
        const stageEl = d3.select("#stage").node();
        d3.select("#subgraph-close").on("click", closeSubgraph);

        // load and store captions for opening subgraph
        let savedCaption = null;
        function openSubgraph(renderFn, subgraphCaptionHtml) {
            d3.select("#subgraph-chart").html("");
            // only snapshot the caption if the panel is currently closed; switching
            // neighborhoods while open would otherwise overwrite the saved base caption
            const wasHidden = subgraph.attr("hidden") !== null;
            subgraph.attr("hidden", null);
            renderFn();
            if (subgraphCaptionHtml !== undefined) {
                if (wasHidden) savedCaption = caption.html();
                caption.html(subgraphCaptionHtml);
            }
        }

        function closeSubgraph() {
            subgraph.attr("hidden", "");
            d3.select("#subgraph-chart").html("");
            subgraphEl.style.left = "";
            subgraphEl.style.top = "";
            subgraphEl.style.transform = "";
            subgraphEl.style.width = "";
            subgraphEl.style.height = "";
            // put back the caption from before
            if (savedCaption !== null) {
                caption.html(savedCaption);
                savedCaption = null;
            }
        }

        // drag the subgraph by its handle bar
        // StackOverflow page as used reference: https://stackoverflow.com/questions/64596035/how-to-use-d3-js-drag-properly
        let subgraphDragStart = null;
        const subgraphDrag = d3.drag()
            .on("start", (event) => {
                const subgraphRect = subgraphEl.getBoundingClientRect();
                const stageRect = stageEl.getBoundingClientRect();
                const startLeft = subgraphRect.left - stageRect.left;
                const startTop = subgraphRect.top - stageRect.top;
                subgraphEl.style.left = startLeft + "px";
                subgraphEl.style.top = startTop + "px";
                subgraphEl.style.transform = "none";
                subgraphDragStart = {
                    mouseX: event.sourceEvent.clientX,
                    mouseY: event.sourceEvent.clientY,
                    left: startLeft,
                    top: startTop
                };
            })
            .on("drag", (event) => {
                if (!subgraphDragStart) return;
                subgraphEl.style.left = (subgraphDragStart.left + event.sourceEvent.clientX - subgraphDragStart.mouseX) + "px";
                subgraphEl.style.top = (subgraphDragStart.top + event.sourceEvent.clientY - subgraphDragStart.mouseY) + "px";
            });
        d3.select("#subgraph-handle").call(subgraphDrag);
        // end citation

        // load data once and use it across all stages
        Promise.all([
            ...CSV_YEARS.map(y => d3.csv(`police_data_${y}.csv`)),
            d3.json(GEOJSON)
        ]).then((results) => {
            const csvData = results.slice(0, -1).flat();
            const geo = results[results.length - 1];

            // GeeksForGeeks page on geoMercator() used as reference: https://www.geeksforgeeks.org/javascript/d3-js-geomercator-function/
            const projection = d3.geoMercator()
                .fitExtent([[10, 45], [map_width - 10, svg_height - 20]], geo);

            const path = d3.geoPath().projection(projection);
            // end citation

            // clean data: remove any rows with no data in the neighborhood or incident category
            // made referencing D3 documentation on selecting and filter()
            const validRows = csvData.filter(d =>
                d["Analysis Neighborhood"] && d["Analysis Neighborhood"].trim() !== "" &&
                d["Incident Category"]     && d["Incident Category"].trim()     !== ""
            );

            // precompute values to use constant scale per year on bubble map
            const yearByNeighborhood = d3.rollup(
                validRows,
                v => v.length,
                d => d["Incident Year"],
                d => d["Analysis Neighborhood"].trim()
            );
            const yearCounts = [...yearByNeighborhood.values()].flatMap(m => [...m.values()]);
            const yearScaleMin = d3.min(yearCounts);
            const yearScaleMax = d3.max(yearCounts);

            // draw the base neighborhood polygons once so they persist across stages
            baseLayer.selectAll("path")
                .data(geo.features)
                .join("path")
                .attr("class", "neighborhood-bg")
                .attr("d", path);

            // WHICH STAGE LAYER
            // handle the layers of data separately to allow the interaction

            // wipes per-stage layers and dispatches to the right render function
            function setStage(name) {
                dataLayer.selectAll("*").remove();
                overlayLayer.selectAll("*").remove();
                uiLayer.selectAll("*").remove();
                narration.html("");
                caption.text("");
                controls.html("");
                closeSubgraph();
                // reset pan/zoom on stage change
                svg.call(zoom.transform, d3.zoomIdentity);
                // toggle palette class on body so css palette rules activate
                d3.select("body")
                    .classed("stage-bubble",     name === "bubble")
                    .classed("stage-choropleth", name === "choropleth");
                if (name === "title")      showTitle();
                if (name === "bubble")     showBubble();
                if (name === "choropleth") showChoropleth();
            }

            // STAGE: TITLE
            function showTitle() {
                narration.html(`
                    <h1>SF Crime on the Map</h1>
                    <h2>by Pika Macchi</h2>
                    <h3>Lots of people <i>think</i> they know a lot about crime in San Francisco, but politically motivated propaganda and a lack of boots-on-the-ground experience means a lot of people don't know as much as they think.
                        <br>This project will tell an expanded story of the crime in San Francisco, giving a deeper insight into the breakdown of what exactly happens, and how it varies.</h3>
                `);
                controls.append("button")
                    .text("Begin")
                    .on("click", () => setStage("bubble"));
            }

            // STAGE: BUBBLE MAP
            function showBubble(year) {
                if (!year) year = "all";

                // check for specific commentary
                const yearMessage = captions.bubbleByYear[year] || captions.bubbleDefault;
                const captionHtml = `
                    <p>${yearMessage}</p>
                    <p>${captions.bubblePrompt}</p>
                `;
                if (subgraph.attr("hidden") === null) {
                    savedCaption = captionHtml;
                } else {
                    caption.html(captionHtml);
                }

                // filter by year
                const yearRows = year === "all"
                    ? validRows
                    : validRows.filter(d => d["Incident Year"] === year);

                // rollup data and get incident count
                const countByNeighborhood = d3.rollup(
                    yearRows,
                    v => v.length,
                    d => d["Analysis Neighborhood"].trim()
                );

                // make entry for each geojson area using centroid
                // made using GitHub example project of centroids used for countries by Curran Kelleher: https://gist.github.com/curran/55d327542393530662c3
                // get separate ranges for year vs all
                const minCount = year === "all" ? d3.min([...countByNeighborhood.values()]) : yearScaleMin;
                const maxCount = year === "all" ? d3.max([...countByNeighborhood.values()]) : yearScaleMax;

                const rScale = d3.scaleSqrt()
                    .domain([0, maxCount])
                    .range([0, 30]);

                const bubbleColorScale = d3.scaleSequential(d3.interpolateYlOrRd)
                    .domain([0, maxCount]);

                const bubbleData = geo.features
                    .map(feature => {
                        const name     = feature.properties.nhood;
                        const count    = countByNeighborhood.get(name) || 0;
                        const centroid = path.centroid(feature);
                        return { name, count, centroid };
                    })
                    .filter(d => d.count > 0 && isFinite(d.centroid[0]) && isFinite(d.centroid[1]));
                // end citation

                // sort bubbles to draw largest ones first
                bubbleData.sort((a, b) => b.count - a.count);

                // wipe layers before drawing
                dataLayer.selectAll("*").remove();
                overlayLayer.selectAll("*").remove();
                uiLayer.selectAll("*").remove();

                // draw bubbles
                dataLayer.append("g")
                    .selectAll("circle")
                    .data(bubbleData)
                    .join("circle")
                    .attr("class", "bubble")
                    .attr("cx",    d => d.centroid[0])
                    .attr("cy",    d => d.centroid[1])
                    .attr("r",     d => rScale(d.count))
                    .attr("fill",  d => bubbleColorScale(d.count))
                    .attr("fill-opacity", 0.78)
                    .attr("stroke", d => d3.color(bubbleColorScale(d.count)).darker(0.6))
                    .attr("stroke-width", "0.8px");

                // title
                uiLayer.append("text")
                    .attr("class", "map-title")
                    .attr("x", map_width / 2)
                    .attr("y", 35)
                    .attr("text-anchor", "middle")
                    .text("Total Crime Incidents by Neighborhood");

                // legend — overlays right edge of map with white background
                const legendG = uiLayer.append("g")
                    .attr("transform", `translate(${svg_width - legend_width - 5}, 50)`);

                legendG.append("rect")
                    .attr("x", -8).attr("y", -20)
                    .attr("width", legend_width - 10).attr("height", 200)
                    .attr("fill", "#ffeded").attr("fill-opacity", 0.92);

                legendG.append("text")
                    .attr("class", "legendTitle")
                    .attr("y", 0)
                    .text("Incident Count");

                const legendValues = [
                    minCount,
                    Math.round(minCount + maxCount / 2),
                    maxCount
                ];

                let y_offset = 18;
                legendValues.forEach(val => {
                    const r = rScale(val);
                    legendG.append("circle")
                        .attr("cx", 26)
                        .attr("cy", y_offset + r)
                        .attr("r", r)
                        .attr("fill", bubbleColorScale(val))
                        .attr("fill-opacity", 0.78)
                        .attr("stroke", d3.color(bubbleColorScale(val)).darker(0.6))
                        .attr("stroke-width", "0.8px");

                    legendG.append("text")
                        .attr("class", "label")
                        .attr("x", 56)
                        .attr("y", y_offset + r + 4)
                        .text(val.toLocaleString());

                    // increase vertical offset for each circle so they don't overlap
                    y_offset += r * 2 + 14;
                });

                // highlight tenderloin and make every neighborhood clickable by area
                overlayLayer.append("g")
                    .selectAll("path")
                    .data(geo.features)
                    .join("path")
                    .attr("d", path)
                    .attr("fill",         d => d.properties.nhood === "Tenderloin" ? "#ff3366" : "transparent")
                    .attr("fill-opacity", d => d.properties.nhood === "Tenderloin" ? 0.25 : 0)
                    .attr("stroke",       d => d.properties.nhood === "Tenderloin" ? "#ff3366" : "none")
                    .attr("stroke-width", d => d.properties.nhood === "Tenderloin" ? "3px" : "0")
                    .style("cursor", "pointer")
                    .on("click", (event, d) => {
                        const name = d.properties.nhood;
                        const isT  = name === "Tenderloin";
                        openSubgraph(
                            () => drawLineGraph(name),
                            `<p>${isT ? captions.bubbleSubgraph : `Showing data for <b>${name}</b>.`}</p>`
                        );
                    })
                    .on("mouseover", function(event, d) {
                        const isT = d.properties.nhood === "Tenderloin";
                        const hoverColor = document.body.classList.contains("stage-bubble") ? "#1f0202" : "#051630";
                        d3.select(this)
                            .attr("stroke",       isT ? "#cc0033" : hoverColor)
                            .attr("stroke-width", isT ? "3px" : "1.5px");
                        tooltip.style("display", "block").text(d.properties.nhood);
                    })
                    .on("mousemove", (event) => {
                        tooltip.style("left", (event.clientX + 12) + "px")
                               .style("top",  (event.clientY - 24) + "px");
                    })
                    .on("mouseout", function(event, d) {
                        const isT = d.properties.nhood === "Tenderloin";
                        d3.select(this)
                            .attr("stroke",       isT ? "#ff3366" : "none")
                            .attr("stroke-width", isT ? "3px" : "0");
                        tooltip.style("display", "none");
                    });

                // year scrubber and continue button
                // w3schools tutorial on js sliders used as reference: https://www.w3schools.com/howto/howto_js_rangeslider.asp
                const yearValues = ["all", "2018", "2019", "2020", "2021", "2022", "2023", "2024", "2025", "2026"];
                if (controls.select("#year-scrubber").empty()) {
                    const scrubberDiv = controls.append("div")
                        .style("display", "inline-block")
                        .style("width", "600px");
                    scrubberDiv.append("input")
                        .attr("type", "range")
                        .attr("id", "year-scrubber")
                        .attr("min", 0)
                        .attr("max", yearValues.length - 1)
                        .attr("step", 1)
                        .style("width", "100%")
                        .on("input", function() { showBubble(yearValues[+this.value]); });
                    scrubberDiv.append("div")
                        .style("display", "flex")
                        .style("justify-content", "space-between")
                        .style("padding", "0 7px")
                        .selectAll("span")
                        .data(yearValues)
                        .join("span")
                        .attr("class", "label")
                        .text(y => y === "all" ? "All" : y); // capitalize just "All"
                    controls.append("button")
                        .style("margin-left", "20px")
                        .text("Continue")
                        .on("click", () => setStage("choropleth"));
                }
                // sync slider to current year
                controls.select("#year-scrubber").property("value", yearValues.indexOf(year));
                // end of citation
            }

            // STAGE: CHOROPLETH
            function showChoropleth() {
                caption.html(`
                    <p>${captions.choropleth}</p>
                    <p>${captions.choroPrompt}</p>
                `);

                // rollup to get most frequent crime for each neighborhood
                // GeeksForGeeks page on Rollup() used as reference: https://www.geeksforgeeks.org/javascript/d3-js-rollup-method/
                const topCrimeByNeighborhood = d3.rollup(
                    validRows,
                    rows => {
                        const counts = d3.rollup(rows, v => v.length, d => d["Incident Category"].trim());
                        return [...counts.entries()].sort((a, b) => b[1] - a[1])[0][0];
                    },
                    d => d["Analysis Neighborhood"].trim()
                );

                const topCategories = [...new Set(topCrimeByNeighborhood.values())].sort();
                // end citation

                // define color scale
                const colorScale = d3.scaleOrdinal(d3.schemeTableau10)
                    .domain(topCategories);

                // draw neighborhoods colored by top crime
                dataLayer.append("g")
                    .selectAll("path")
                    .data(geo.features)
                    .join("path")
                    .attr("class", "neighborhood")
                    .attr("d", path)
                    .attr("fill", d => {
                        const name  = d.properties.nhood;
                        const crime = topCrimeByNeighborhood.get(name);
                        return crime ? colorScale(crime) : "#cccccc";
                    })
                    .attr("stroke", "#ffffff")
                    .attr("stroke-width", "1px");

                // title
                uiLayer.append("text")
                    .attr("class", "map-title")
                    .attr("x", map_width / 2)
                    .attr("y", 35)
                    .attr("text-anchor", "middle")
                    .text("Most Common Crime Type by Neighborhood");

                // legend — overlays right edge of map with white background
                const legendOrdinalG = uiLayer.append("g")
                    .attr("class", "legendOrdinal")
                    .attr("transform", `translate(${svg_width - legend_width - 5}, 45)`);

                legendOrdinalG.append("rect")
                    .attr("x", -8).attr("y", -22)
                    .attr("width", legend_width - 10).attr("height", topCategories.length * 20 + 50)
                    .attr("fill", "#edf4ff").attr("fill-opacity", 0.92);

                const choroplethLegend = d3.legendColor()
                    .title("Most Common Crime")
                    .titleWidth(legend_width - 10)
                    .scale(colorScale)
                    .shapeWidth(14)
                    .shapeHeight(14)
                    .shapePadding(4)
                    .labelOffset(6);

                legendOrdinalG.call(choroplethLegend);

                // highlight tenderloin and make every neighborhood clickable for the treemap
                overlayLayer.append("g")
                    .selectAll("path")
                    .data(geo.features)
                    .join("path")
                    .attr("d", path)
                    .attr("fill",         d => d.properties.nhood === "Tenderloin" ? "#ff3366" : "transparent")
                    .attr("fill-opacity", d => d.properties.nhood === "Tenderloin" ? 0.25 : 0)
                    .attr("stroke",       d => d.properties.nhood === "Tenderloin" ? "#ff3366" : "none")
                    .attr("stroke-width", d => d.properties.nhood === "Tenderloin" ? "3px" : "0")
                    .style("cursor", "pointer")
                    .on("click", (event, d) => {
                        const name = d.properties.nhood;
                        const isT  = name === "Tenderloin";
                        openSubgraph(
                            () => drawTreemap(name),
                            `<p>${isT ? captions.choroplethSubgraph : `Showing data for <b>${name}</b>.`}</p>`
                        );
                    })
                    .on("mouseover", function(event, d) {
                        const isT = d.properties.nhood === "Tenderloin";
                        const hoverColor = document.body.classList.contains("stage-bubble") ? "#1f0202" : "#051630";
                        d3.select(this)
                            .attr("stroke",       isT ? "#cc0033" : hoverColor)
                            .attr("stroke-width", isT ? "3px" : "1.5px");
                        tooltip.style("display", "block").text(d.properties.nhood);
                    })
                    .on("mousemove", (event) => {
                        tooltip.style("left", (event.clientX + 12) + "px")
                               .style("top",  (event.clientY - 24) + "px");
                    })
                    .on("mouseout", function(event, d) {
                        const isT = d.properties.nhood === "Tenderloin";
                        d3.select(this)
                            .attr("stroke",       isT ? "#ff3366" : "none")
                            .attr("stroke-width", isT ? "3px" : "0");
                        tooltip.style("display", "none");
                    });

                // back button to return to the bubble map
                controls.html("");
                controls.append("button")
                    .text("Back")
                    .on("click", () => setStage("bubble"));
            }

            // line graph of top 5 categories over time for the given neighborhood
            function drawLineGraph(neighborhood) {
                const nRows = validRows.filter(d => d["Analysis Neighborhood"].trim() === neighborhood);

                // top 5 categories by total count
                const catTotals = d3.rollup(nRows, v => v.length, d => d["Incident Category"].trim());
                const top5 = [...catTotals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5).map(d => d[0]);

                const years = [...new Set(validRows.map(d => d["Incident Year"]))].sort();

                // rollup by year and category for just the top 5
                const byYearCat = d3.rollup(
                    nRows.filter(d => top5.includes(d["Incident Category"].trim())),
                    v => v.length,
                    d => d["Incident Year"],
                    d => d["Incident Category"].trim()
                );

                const series = top5.map(cat => ({
                    name: cat,
                    values: years.map(y => ({ year: +y, count: (byYearCat.get(y) || new Map()).get(cat) || 0 }))
                }));

                const margin = { top: 30, right: 140, bottom: 40, left: 55 };
                const w = 660, h = 340;
                const iw = w - margin.left - margin.right;
                const ih = h - margin.top - margin.bottom;

                const sg = d3.select("#subgraph-chart").append("svg")
                    .attr("viewBox", [0, 0, w, h])
                    .attr("width", "100%");

                const g = sg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

                const xScale = d3.scaleLinear().domain(d3.extent(years, y => +y)).range([0, iw]);
                const yMax   = d3.max(series.flatMap(s => s.values.map(v => v.count)));
                const yScale = d3.scaleLinear().domain([0, yMax]).nice().range([ih, 0]);
                const color  = d3.scaleOrdinal(d3.schemeTableau10).domain(top5);

                // grid lines
                g.append("g")
                    .call(d3.axisLeft(yScale).tickSize(-iw).tickFormat(""))
                    .call(gg => gg.select(".domain").remove())
                    .selectAll("line").style("stroke", "#e0e0e0");

                // axes
                g.append("g")
                    .attr("transform", `translate(0,${ih})`)
                    .call(d3.axisBottom(xScale).ticks(years.length).tickFormat(d3.format("d")));
                g.append("g").call(d3.axisLeft(yScale));

                // axis labels
                g.append("text").attr("class", "label")
                    .attr("text-anchor", "middle")
                    .attr("x", iw / 2).attr("y", ih + 35)
                    .text("Incident Year");
                g.append("text").attr("class", "label")
                    .attr("text-anchor", "middle")
                    .attr("transform", "rotate(-90)")
                    .attr("x", -ih / 2).attr("y", -44)
                    .text("Count of Incident Category");

                // one line per category
                const line = d3.line().x(d => xScale(d.year)).y(d => yScale(d.count));
                g.append("g")
                    .selectAll("path")
                    .data(series)
                    .join("path")
                    .attr("fill", "none")
                    .attr("stroke", d => color(d.name))
                    .attr("stroke-width", 2)
                    .attr("d", d => line(d.values));

                // legend
                const legendG = sg.append("g").attr("transform", `translate(${w - margin.right + 10},${margin.top})`);
                top5.forEach((cat, i) => {
                    legendG.append("rect")
                        .attr("y", i * 20).attr("width", 12).attr("height", 12)
                        .attr("fill", color(cat));
                    legendG.append("text").attr("class", "label")
                        .attr("x", 16).attr("y", i * 20 + 10)
                        .text(cat);
                });

                sg.append("text").attr("class", "map-title")
                    .attr("text-anchor", "middle")
                    .attr("x", w / 2).attr("y", 18)
                    .text(`${neighborhood} — Top 5 Crime Categories over Time`);
            }

            // treemap of all crime categories for the given neighborhood
            // d3.treemap() docs used as reference: https://d3js.org/d3-hierarchy/treemap
            function drawTreemap(neighborhood) {
                const nRows = validRows.filter(d => d["Analysis Neighborhood"].trim() === neighborhood);

                // rollup to category counts and build hierarchy
                const catCounts = d3.rollup(nRows, v => v.length, d => d["Incident Category"].trim());
                const root = d3.hierarchy({
                    name: "root",
                    children: [...catCounts.entries()].map(([name, value]) => ({ name, value }))
                }).sum(d => d.value).sort((a, b) => b.value - a.value);

                const w = 660, h = 380;
                d3.treemap().size([w, h - 30]).padding(2)(root);

                // color scale, middle range of blues
                const maxVal     = d3.max(root.leaves(), d => d.value);
                const colorScale = d => d3.interpolateBlues(0.3 + 0.7 * (d / maxVal));

                const sg = d3.select("#subgraph-chart").append("svg")
                    .attr("viewBox", [0, 0, w, h])
                    .attr("width", "100%");

                sg.append("text").attr("class", "map-title")
                    .attr("text-anchor", "middle")
                    .attr("x", w / 2).attr("y", 20)
                    .text(`${neighborhood} — Breakdown of Total Crime Type`);

                const g = sg.append("g").attr("transform", "translate(0,28)");
                const cell = g.selectAll("g")
                    .data(root.leaves())
                    .join("g")
                    .attr("transform", d => `translate(${d.x0},${d.y0})`);

                // rects
                cell.append("rect")
                    .attr("width",  d => d.x1 - d.x0)
                    .attr("height", d => d.y1 - d.y0)
                    .attr("fill",   d => colorScale(d.value))
                    .attr("stroke", "#fff")
                    .attr("stroke-width", 1);

                // labels where there's room — white text overrides the .label fill
                cell.filter(d => d.x1 - d.x0 > 60)
                    .append("text").attr("class", "label").style("fill", "white")
                    .attr("x", 4).attr("y", 14)
                    .text(d => d.data.name);

                cell.filter(d => d.x1 - d.x0 > 60 && d.y1 - d.y0 > 28)
                    .append("text").attr("class", "label").style("fill", "white")
                    .attr("x", 4).attr("y", 27)
                    .text(d => d.value.toLocaleString());
            }
            // end citation

            // start at the title screen
            setStage("title");
        });

    </script>
</body>
</html>
